name: 'Build CL Node Image'
description: 'Build Chainlink node image with plugins'

runs:
  using: "composite"
  steps:
    - name: Checkout Chainlink repository
      uses: actions/checkout@v5
      with:
        repository: smartcontractkit/chainlink
        ref: f336afde4283599b3a060e4bc38cac6bb6707381
        path: chainlink-repo

    - name: Setup path to go.mod
      id: go-mod
      shell: bash
      env:
        WORKSPACE: ${{ github.workspace }}
      run: |
        echo "path=${WORKSPACE}/chainlink-repo/go.mod" | tee -a "$GITHUB_OUTPUT"

    - name: Set up Go
      uses: actions/setup-go@v6 # v6
      with:
        go-version-file: ${{ steps.go-mod.outputs.path }}
        cache: true

    - name: Download Go modules
      working-directory: ${{ github.workspace }}/chainlink-repo
      shell: bash
      run: go mod download
    
    - name: Upgrade chainlink-ccv dependency to current commit
      working-directory: ${{ github.workspace }}/chainlink-repo
      shell: bash
      run: |
        # Merge queue commits can take a short time to become fetchable via Go module resolution.
        success=0
        for i in {1..5}; do
          if go get github.com/smartcontractkit/chainlink-ccv@${{ github.event.pull_request.head.sha || github.sha }}; then
            success=1
            break
          fi
          echo "go get failed (attempt $i/5), retrying in 10s..."
          sleep 10
        done
        if [ "$success" -ne 1 ]; then
          echo "go get failed after 5 attempts"
          exit 1
        fi
        make gomodtidy

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

    - name: Build and Load Docker Image
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        cache-from: type=gha,timeout=10m,scope=ccv-${{ runner.os }}-${{ runner.arch }}
        cache-to: type=gha,timeout=10m,mode=max,ignore-error=true,scope=ccv-${{ runner.os }}-${{ runner.arch }}
        context: ${{ github.workspace }}/chainlink-repo
        file: ${{ github.workspace }}/chainlink-repo/plugins/chainlink.Dockerfile
        load: true
        tags: local
