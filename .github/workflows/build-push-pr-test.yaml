name: "[TEST] PR ECR Push Validation"

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/build-push-pr-test.yaml'
      - '.github/workflows/build-push-main.yaml'
      - '.github/workflows/release-rc-publish.yaml'
      - '.github/actions/aws-ecr-auth/**'

concurrency:
  group: pr-ecr-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-pub:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [verifier, aggregator, indexer, executor]
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Just
        uses: extractions/setup-just@e33e0265a09d6d736e2ee1e0eb685ef1de4669ff
        with:
          just-version: '1.40.0'

      - name: Authenticate to AWS ECR (primary)
        uses: ./.github/actions/aws-ecr-auth
        with:
          role-to-assume: ${{ secrets.CCV_IAM_ROLE_PRIMARY }}
          aws-region: us-west-2
          registry-type: private

      - name: Clear AWS credentials before secondary auth
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          aws-region: us-west-2
          unset-current-credentials: true

      - name: Authenticate to AWS ECR (secondary)
        uses: ./.github/actions/aws-ecr-auth
        with:
          role-to-assume: ${{ secrets.CCV_IAM_ROLE_SECONDARY }}
          aws-region: us-east-2
          registry-type: private

      - name: Build & Publish Test Image
        env:
          MODULE: ${{ matrix.module }}
          COMMIT_SHA: ${{ github.sha }}
          ECR_REGISTRY_PRIMARY: ${{ secrets.ECR_REGISTRY_PRIMARY }}
          ECR_REGISTRY_SECONDARY: ${{ secrets.ECR_REGISTRY_SECONDARY }}
        run: |
          # pr- prefix makes test images easy to identify and clean up
          TAG="pr-${{ github.event.pull_request.number }}-$COMMIT_SHA"

          echo "Module: $MODULE"
          echo "Commit SHA: $COMMIT_SHA"
          echo "PR Tag: $TAG"
          echo "Building image.."
          just "$MODULE"/build-rc
          echo "Publishing image (primary).."
          just "$MODULE"/publish-rc "$ECR_REGISTRY_PRIMARY" "$TAG"
          echo "Publishing image (secondary).."
          just "$MODULE"/publish-rc "$ECR_REGISTRY_SECONDARY" "$TAG"
