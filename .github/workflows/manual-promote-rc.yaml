name: Manual promote RC image

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Full image tag to promote (e.g. e41e205c8bfa6033e6c66ad2ea7d0969bac99ff1-rc)"
        required: true
        default: "e41e205c8bfa6033e6c66ad2ea7d0969bac99ff1-rc"

jobs:
  promote-rc:
    name: Promote ${{ matrix.module }} (${{ inputs.image-tag }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [verifier, aggregator, indexer, executor]
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to AWS ECR (source — primary)
        uses: ./.github/actions/aws-ecr-auth
        with:
          role-to-assume: ${{ secrets.CCV_IAM_ROLE_PRIMARY }}
          aws-region: us-west-2
          registry-type: private

      - name: Pull RC image from primary ECR
        env:
          MODULE: ${{ matrix.module }}
          IMAGE_TAG: ${{ inputs.image-tag }}
          PRIMARY_ECR_REPO: ${{ secrets.ECR_REGISTRY_PRIMARY }}
        run: |
          SOURCE="${PRIMARY_ECR_REPO}/containers/chainlink-ccv-${MODULE}:${IMAGE_TAG}"
          echo "Pulling source image: ${SOURCE}"
          docker pull "${SOURCE}"

      - name: Clear AWS credentials before destination auth
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          aws-region: us-west-2
          unset-current-credentials: true

      - name: Authenticate to AWS ECR (destination)
        uses: ./.github/actions/aws-ecr-auth
        with:
          role-to-assume: ${{ secrets.CCV_IAM_ROLE }}
          aws-region: us-west-2
          registry-type: private

      - name: Re-tag and push to destination ECR
        env:
          MODULE: ${{ matrix.module }}
          IMAGE_TAG: ${{ inputs.image-tag }}
          PRIMARY_ECR_REPO: ${{ secrets.ECR_REGISTRY_PRIMARY }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          SOURCE="${PRIMARY_ECR_REPO}/containers/chainlink-ccv-${MODULE}:${IMAGE_TAG}"
          DEST="${ECR_REGISTRY}/containers/chainlink-ccv-${MODULE}:${IMAGE_TAG}"

          docker tag "${SOURCE}" "${DEST}"
          echo "Pushing ${DEST}"
          docker push "${DEST}"
          echo "Promoted ${MODULE} → ${DEST}"
