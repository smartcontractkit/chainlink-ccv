name: golangci-lint

on:
  merge_group:
  pull_request:
  push:
    branches:
      - main

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Setup GitHub Token
        id: setup-github-token
        uses: smartcontractkit/.github/actions/setup-github-token@ef78fa97bf3c77de6563db1175422703e9e6674f # setup-github-token@0.2.1
        with:
          aws-role-arn: ${{ secrets.GATI_AWS_ROLE_ARN_CHAINLINK_READ_ONLY }}
          aws-lambda-url: ${{ secrets.GATI_LAMBDA_URL_RELENG }}
          aws-region: ${{ secrets.GATI_AWS_REGION }}
          set-git-config: true

      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6 # v6
        env:
          GOPRIVATE: github.com/smartcontractkit/*
        with:
          cache: true
          go-version-file: 'go.mod'

      - name: Load tool versions
        id: tool-versions
        shell: bash
        run: |
          set -euo pipefail
          source "${GITHUB_WORKSPACE}/tool-versions.env"
          echo "golangci_lint_version=$VERSION_GOLANGCI_LINT" >> "$GITHUB_OUTPUT"
          echo "gomods_version=$VERSION_GOMODS" >> "$GITHUB_OUTPUT"

      # Build golangci-lint from source with the Go toolchain set up above so
      # the binary is stamped with the same Go version that compiles the linted
      # code. The prebuilt binary distributed by golangci-lint-action is built
      # with an older Go release and trips `ensure-golangci-lint`'s build-tag
      # check after a Go version bump.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v${{ steps.tool-versions.outputs.golangci_lint_version }}

      - name: Install just
        uses: extractions/setup-just@e33e0265a09d6d736e2ee1e0eb685ef1de4669ff # v3

      - name: Install gomods
        run: go install github.com/jmank88/gomods@v${{ steps.tool-versions.outputs.gomods_version }}

      - name: Lint
        run: just lint
