# Phased-runtime CL-mode overlay (issue 16).
#
# Layer this on top of env-phased.toml:
#   ccv --env-mode phased up env-phased.toml,env-cl-phased.toml
#
# CL mode is a property of the verifier (mode = "cl"): instead of running as
# standalone containers, verifier jobs run on shared Chainlink nodes.
# SCOPE: only the verifiers run in CL mode here. The executors stay standalone.
#
# Config merge (deepMergeMaps) merges nested *maps* key-by-key but replaces
# *arrays* wholesale. This overlay:
#   1. Clears [committeeccv] (empty aggregator/verifier arrays → no-op early
#      return in the standalone component, letting committeeccv_clnode take over).
#   2. Adds [committeeccv_clnode] with the full self-contained CL-node config
#      (node sets + aggregators mirrored from env-phased.toml + CL-mode verifiers).
#   3. Replaces the NOP and committee topology with the two shared CL nodes.
# The executor section, executor_pools, blockchains, observability, jd, and
# indexer sections are all inherited from env-phased.toml.

#############################
# Disable the standalone committeeccv component so it is a no-op when this
# overlay is applied. The committeeccv_clnode component below takes over.
#############################
[committeeccv]
version = 1
aggregator = []
verifier = []

#############################
# CL-node variant of CommitteeCCV (committeeccv_clnode component).
# Contains: CL node sets, aggregators (mirrored from env-phased.toml), and
# CL-mode verifiers. Delete this section (and component_clnode.go) when CL
# nodes leave the devenv.
#############################
[committeeccv_clnode]
version = 1
cl_nodes_funding_eth = 50
cl_nodes_funding_link = 50

[[committeeccv_clnode.node_sets]]
  name = "don"
  nodes = 2
  override_mode = "each"

  [committeeccv_clnode.node_sets.db]
    image = "postgres:15.0"

  [[committeeccv_clnode.node_sets.node_specs]]
    [committeeccv_clnode.node_sets.node_specs.node]
      docker_ctx = "../../../chainlink"
      docker_file = "plugins/chainlink.Dockerfile"
    [committeeccv_clnode.node_sets.node_specs.node.env_vars]
      CL_EVM_CMD = ""

  [[committeeccv_clnode.node_sets.node_specs]]
    [committeeccv_clnode.node_sets.node_specs.node]
      docker_ctx = "../../../chainlink"
      docker_file = "plugins/chainlink.Dockerfile"
    [committeeccv_clnode.node_sets.node_specs.node.env_vars]
      CL_EVM_CMD = ""

# Aggregators: mirrors [[committeeccv.aggregator]] in env-phased.toml.
# Aggregator config is identical between standalone and CL-node modes; the
# only change is the component key.
[[committeeccv_clnode.aggregator]]
  committee_name = "default"
  image = "aggregator:latest"
  host_port = 50051
  redundant_aggregators = 1
  source_code_path = "../aggregator"
  root_path = "../../"

  [committeeccv_clnode.aggregator.db]
    image = "postgres:16-alpine"
    host_port = 7432

  [committeeccv_clnode.aggregator.redis]
    image = "redis:7-alpine"
    host_port = 6379

  [[committeeccv_clnode.aggregator.api_clients]]
  client_id = "default-verifier-1"
  description = "Development default verifier 1"
  enabled = true
  groups = ["verifiers"]

  [[committeeccv_clnode.aggregator.api_clients]]
  client_id = "default-verifier-2"
  description = "Development default verifier 2"
  enabled = true
  groups = ["verifiers"]

  [[committeeccv_clnode.aggregator.api_clients]]
  client_id = "monitoring"
  description = "Monitoring and infrastructure client"
  enabled = true
  groups = ["monitoring"]

  [[committeeccv_clnode.aggregator.api_clients]]
  client_id = "indexer"
  description = "Development Indexer"
  enabled = true
  groups = ["indexer"]

  [committeeccv_clnode.aggregator.env]
    storage_connection_url = "postgresql://aggregator:aggregator@default-aggregator-db:5432/aggregator?sslmode=disable"
    redis_address = "default-aggregator-redis:6379"
    redis_password = ""
    redis_db = "0"

[[committeeccv_clnode.aggregator]]
