# steady: 1msg/10s for 10min, both directions
[[test_profiles]]
    enabled=true
    chains_as_source=[
        {selector="3379446385462418246", ratio=1},  # 0G mainnet
        {selector="4793464827907405086", ratio=1}, # plume mainnet
    ]
    chains_as_dest=[
        {selector="3379446385462418246", ratio=1},  # 0G mainnet
        {selector="4793464827907405086", ratio=1}, # plume mainnet
    ]
    messages=[
        {ratio=1, message_profile="PTT"},
    ]
    test_duration = "10m"
    # Should be "integer/duration" like "1/1s" or "10/5m"
    message_rate = "1/10s"
    load_duration = "10m"


