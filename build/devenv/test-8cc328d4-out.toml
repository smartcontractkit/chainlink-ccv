type = 'anvil'
# Blockchain family, can be one of: evm solana aptos sui tron ton canton stellar
family = 'evm'
# Blockchain Docker container name
container_name = 'blockchain-3rd'
# Chain ID
chain_id = '3337'

# Blockchain nodes info
[[blockchains.out.nodes]]
# External blockchain node WebSocket URL
ws_url = 'ws://127.0.0.1:8565'
# External blockchain node HTTP URL
http_url = 'http://127.0.0.1:8565'
# Internal blockchain node WebSocket URL
internal_ws_url = 'ws://blockchain-3rd:8565'
# Internal blockchain node HTTP URL
internal_http_url = 'http://blockchain-3rd:8565'

[protocol_contracts]

[aggregator_endpoints]
default = 'localhost:50051'
secondary = 'localhost:50052'
tertiary = 'localhost:50053'

[aggregator_ca_cert_files]
default = '/Users/bukata/Library/Preferences/ccv/tls-shared/ca.crt'
secondary = '/Users/bukata/Library/Preferences/ccv/tls-shared/ca.crt'
tertiary = '/Users/bukata/Library/Preferences/ccv/tls-shared/ca.crt'

[environment_topology]
indexer_address = ['http://indexer-1:8100']
pyroscope_url = 'http://host.docker.internal:4040'

[environment_topology.monitoring]
Enabled = true
Type = 'beholder'

[environment_topology.monitoring.Beholder]
InsecureConnection = true
CACertFile = ''
OtelExporterGRPCEndpoint = ''
OtelExporterHTTPEndpoint = 'host.docker.internal:4318'
LogStreamingEnabled = true
MetricReaderInterval = 5
TraceSampleRatio = 1.0
TraceBatchTimeout = 10

